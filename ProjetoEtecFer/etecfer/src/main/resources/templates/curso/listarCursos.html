<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Cursos</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="container-lista">

        <div class="topo">
            <h1>Lista de Cursos</h1>

            <a href="/cursos/criar" class="btn-novo">
                + Novo Curso
            </a>
        </div>

        <table>

            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Período</th>
                    <th>Carga Horária</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="curso : ${cursos}">
                    <td th:text="${curso.nomeCurso}"></td>
                    <td th:text="${curso.periodoCurso}"></td>
                    <td th:text="${curso.chCurso}"></td>

                    <td>
                        <a th:href="@{/cursos/editar/{id}(id=${curso.idCurso})}" class="btn-editar">
                            Editar
                        </a>

                        <a th:href="@{/cursos/excluir/{id}(id=${curso.idCurso})}" class="btn-excluir">
                            Excluir
                        </a>
                    </td>
                </tr>
            </tbody>

        </table>

        <div class="voltar">
            <a href="/" class="btn-voltar">
                ← Página Inicial
            </a>
        </div>

    </div>

</body>
</html>
