<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cursos</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="container">

        <h1>Cadastrar Curso</h1>

        <form th:action="@{/cursos/salvar}" method="post" th:object="${curso}">

            <input type="hidden" th:field="*{idCurso}" />

            <div class="campo">
                <label>Nome do Curso</label>
                <input type="text" th:field="*{nomeCurso}" placeholder="Digite o nome do curso">
            </div>

            <div class="campo">
                <label>Período</label>
                <input type="text" th:field="*{periodoCurso}" placeholder="Manhã, Tarde ou Noite">
            </div>

            <div class="campo">
                <label>Carga Horária</label>
                <input type="text" th:field="*{chCurso}" placeholder="Ex.: 1200 horas">
            </div>

            <div class="botoes">
                <input type="submit" value="Salvar" class="btn">

                <a href="/cursos/listar" class="btn-voltar">
                    Voltar
                </a>
            </div>

        </form>

    </div>

</body>
</html>
