<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Alunos</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="container">

        <h1>Cadastrar Aluno</h1>

        <form th:action="@{/alunos/salvar}" method="post" th:object="${aluno}">

            <input type="hidden" th:field="*{idAluno}"/>

            <div class="campo">
                <label>Nome</label>
                <input type="text" th:field="*{nomeAluno}">
            </div>

            <div class="campo">
                <label>E-mail</label>
                <input type="email" th:field="*{emailAluno}">
            </div>

            <div class="campo">
                <label>Telefone</label>
                <input type="text" th:field="*{telefoneAluno}">
            </div>

            <div class="campo">
                <label>RA</label>
                <input type="text" th:field="*{raAluno}">
            </div>

            <div class="campo">
                <label>CPF</label>
                <input type="text" th:field="*{cpfAluno}">
            </div>

            <div class="botoes">
                <input type="submit" value="Salvar" class="btn">

                <a href="/alunos/listar" class="btn-voltar">
                    Voltar
                </a>
            </div>

        </form>

    </div>

</body>
</html>
